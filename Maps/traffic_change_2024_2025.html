": 40.684349, "lon": -73.977542, "change": 0.89, "color": "#fdae6b", "volume_2024": 58608.0, "volume_2025": 59127.0, "directions_2024": "", "directions_2025": "", "matched_direction": "", "volume_comparability": "", "needs_review": "", "streams_shared": "9"}, {"dataset": "VTMC", "site_id": "33P2", "name": "Canal St at Walker St", "lat": 40.717278, "lon": -73.99895, "change": -12.14, "color": "#1f78b4", "volume_2024": 35552.0, "volume_2025": 31235.0, "directions_2024": "", "directions_2025": "", "matched_direction": "", "volume_comparability": "", "needs_review": "", "streams_shared": "3"}, {"dataset": "VTMC", "site_id": "3A8", "name": "Union Square at 15th St", "lat": 40.735344, "lon": -73.989915, "change": -1.25, "color": "#6baed6", "volume_2024": 26476.0, "volume_2025": 26144.0, "directions_2024": "", "directions_2025": "", "matched_direction": "", "volume_comparability": "", "needs_review": "", "streams_shared": "4"}, {"dataset": "VTMC", "site_id": "9P1", "name": "8th Ave at 41 St", "lat": 40.756704, "lon": -73.99034, "change": -2.93, "color": "#6baed6", "volume_2024": 20427.0, "volume_2025": 19828.0, "directions_2024": "", "directions_2025": "", "matched_direction": "", "volume_comparability": "", "needs_review": "", "streams_shared": "4"}];
    const map = L.map('map');
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    const bounds = [];
    const layers = { ATR: L.layerGroup(), VTMC: L.layerGroup() };

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, (char) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[char]));
    }

    function directionComparison(point) {
      const directions2024 = point.directions_2024 || '';
      const directions2025 = point.directions_2025 || '';
      if (directions2024 || directions2025) {
        return `2024 ${directions2024 || 'n/a'} → 2025 ${directions2025 || 'n/a'}`;
      }
      if (point.matched_direction) {
        return point.matched_direction;
      }
      return 'n/a';
    }

    function popup(point) {
      const change = Number(point.change).toFixed(1);
      const volume2024 = point.volume_2024 == null ? 'n/a' : Math.round(point.volume_2024).toLocaleString();
      const volume2025 = point.volume_2025 == null ? 'n/a' : Math.round(point.volume_2025).toLocaleString();
      const comparability = point.volume_comparability || '';
      const needsReview = String(point.needs_review || '').toUpperCase() === 'TRUE';
      const hasWarning = needsReview || comparability === 'direction_methodology_mismatch';
      const streamLine = point.streams_shared ? `<br><b>Shared streams:</b> ${escapeHtml(point.streams_shared)}` : '';
      const warningLine = hasWarning
        ? `<br><b>Review warning:</b> ${needsReview ? 'Needs review' : 'Check comparability'}${comparability ? ` (${escapeHtml(comparability)})` : ''}`
        : '';
      return `<strong>${escapeHtml(point.dataset)} ${escapeHtml(point.site_id)}</strong><br>` +
        `<b>Location:</b> ${escapeHtml(point.name)}<br>` +
        `<b>Direction:</b> ${escapeHtml(directionComparison(point))}<br>` +
        `<b>Change:</b> ${change}%<br>` +
        `<b>2024 volume:</b> ${volume2024}<br>` +
        `<b>2025 volume:</b> ${volume2025}${streamLine}${warningLine}`;
    }

    const overlapGroups = new Map();
    for (const point of points) {
      const key = `${point.dataset}:${point.lat.toFixed(6)},${point.lon.toFixed(6)}`;
      if (!overlapGroups.has(key)) {
        overlapGroups.set(key, []);
      }
      overlapGroups.get(key).push(point);
    }

    function offsetLatLng(point, index, total) {
      const base = L.latLng(point.lat, point.lon);
      if (total < 2) {
        return base;
      }

      // Spread same-coordinate markers side-by-side on the screen so directional
      // pairs such as EB/WB counts can both be clicked without changing the data.
      const angle = total === 2 ? (index === 0 ? Math.PI : 0) : (2 * Math.PI * index) / total;
      const offsetMeters = 10;
      const earthRadiusMeters = 6378137;
      const latOffset = (Math.sin(angle) * offsetMeters / earthRadiusMeters) * (180 / Math.PI);
      const lonOffset = (Math.cos(angle) * offsetMeters / (earthRadiusMeters * Math.cos(base.lat * Math.PI / 180))) * (180 / Math.PI);
      return L.latLng(base.lat + latOffset, base.lng + lonOffset);
    }

    for (const group of overlapGroups.values()) {
      group.forEach((point, index) => {
        const latlng = offsetLatLng(point, index, group.length);
        bounds.push([point.lat, point.lon]);
        const options = { radius: 7, color: '#333', weight: 1, fillColor: point.color, fillOpacity: 0.82 };
        const marker = point.dataset === 'ATR'
          ? L.circleMarker(latlng, options)
          : L.marker(latlng, { icon: L.divIcon({ className: '', html: `<span style="display:block;width:13px;height:13px;background:${point.color};border:1px solid #333;"></span>`, iconSize: [13, 13] }) });
        marker.bindPopup(popup(point));
        marker.addTo(layers[point.dataset]);
      });
    }

    layers.ATR.addTo(map);
    layers.VTMC.addTo(map);
    L.control.layers(null, layers, { collapsed: false }).addTo(map);
    map.fitBounds(bounds, { padding: [30, 30] });

    const legend = L.control({ position: 'bottomright' });
    legend.onAdd = function () {
      const div = L.DomUtil.create('div', 'legend');
      div.innerHTML = '<strong>2024→2025 change</strong><br>' +
        '<span class="swatch" style="background:#1f78b4"></span>≤ -10%<br>' +
        '<span class="swatch" style="background:#6baed6"></span>-10% to 0%<br>' +
        '<span class="swatch" style="background:#fdae6b"></span>0% to 10%<br>' +
        '<span class="swatch" style="background:#e31a1c"></span>≥ 10%<br><hr>' +
        '○ ATR &nbsp; □ VTMC';
      return div;
    };
    legend.addTo(map);
  </script>
